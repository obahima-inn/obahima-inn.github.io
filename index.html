<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fffaf0; /* A soft cream color */
            color: #5d4037; /* A soft wood/brown color */
            font-family: 'Gaegu', cursive; /* Applying the cute font */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 6rem; /* Made the Kanji nice and big */
            margin-bottom: 0;
            color: #ff8a80; /* A soft pink/red for the title */
            line-height: 1;
        }

        .subtitle {
            font-size: 2rem;
            margin-top: -10px; /* Pulls it closer to the main title */
            color: #bc8f8f; /* A slightly faded brown/rose color */
            letter-spacing: 2px;
        }

        p {
            font-size: 1.5rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Obā日間</h1>
    <div class="subtitle">obahima inn</div>

    <p>Still under construction...</p>
    <p>See you in the future! ✨</p>

</body>
</html>
