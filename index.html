<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fffaf0; 
            color: #5d4037; 
            font-family: 'Yusei Magic', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* This creates the happy side-to-side swaying motion */
        @keyframes cozySway {
            0% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
            100% { transform: rotate(-3deg); }
        }

        .logo-container {
            animation: happyHum 4s ease-in-out infinite;
            display: inline-block;
            cursor: default;
        }

        h1 {
            font-size: 7rem;
            margin-bottom: 0;
            color: #ff8a80; 
            line-height: 1;
        }

        /* Styling the 'a' with a custom hand-drawn line above it */
        .macron-container {
            display: inline-block;
            position: relative;
        }

        .macron-line {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 6px;
            background-color: #ff8a80; /* Matches the font color */
            border-radius: 3px;
        }

        .subtitle {
            font-size: 2.2rem;
            margin-top: 5px; 
            color: #bc8f8f; 
            letter-spacing: 6px;
            text-transform: lowercase;
        }

        p {
            font-size: 1.6rem;
            margin-top: 40px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1>
            Ob<span class="macron-container"><span class="macron-line"></span>a</span>日間 inn
        </h1>
        <div class="subtitle">obahima inn</div>
    </div>

    <p>Still under construction...</p>
    <p>See you in the future! ✨</p>

</body>
</html>
